services:
  express_feedback_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express_feedback_app
    restart: always
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./data:/usr/src/app/data
    environment:
      - NODE_ENV=development
    networks:
      - app-network

  nginx_proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - express_feedback_app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
